name: Build APK

on:
  push:
    branches:
      - claude/samsung-notes-mvp-android-JHvBk
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Accept Android SDK licenses
        run: yes | flutter doctor --android-licenses || true

      - name: Flutter doctor
        run: flutter doctor -v

      - name: Install dependencies
        run: flutter pub get

      - name: Show local.properties
        run: cat android/local.properties || echo "local.properties not found"

      - name: Build debug APK (capture log)
        run: flutter build apk --debug --verbose 2>&1 | tee /tmp/flutter_build.log; exit ${PIPESTATUS[0]}

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: /tmp/flutter_build.log
          retention-days: 7

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: samsung-notes-mvp-debug
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 30

      - name: Build release APK (unsigned)
        run: flutter build apk --release
        continue-on-error: true

      - name: Upload release APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: samsung-notes-mvp-release-unsigned
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
        continue-on-error: true
