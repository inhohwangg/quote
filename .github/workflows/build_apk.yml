name: Build APK

on:
  push:
    branches:
      - claude/samsung-notes-mvp-android-JHvBk
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Create google-services.json placeholder
        run: |
          cat > android/app/google-services.json << 'EOF'
          {
            "project_info": {
              "project_number": "000000000000",
              "project_id": "placeholder-project",
              "storage_bucket": "placeholder-project.appspot.com"
            },
            "client": [
              {
                "client_info": {
                  "mobilesdk_app_id": "1:000000000000:android:0000000000000000000000",
                  "android_client_info": {
                    "package_name": "com.example.quote"
                  }
                },
                "oauth_client": [],
                "api_key": [
                  {
                    "current_key": "placeholder_api_key"
                  }
                ],
                "services": {
                  "appinvite_service": {
                    "other_platform_oauth_client": []
                  }
                }
              }
            ],
            "configuration_version": "1"
          }
          EOF

      - name: Install dependencies
        run: flutter pub get

      - name: Build debug APK
        run: flutter build apk --debug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: samsung-notes-mvp-debug
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 30

      - name: Build release APK (unsigned)
        run: flutter build apk --release
        continue-on-error: true

      - name: Upload release APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: samsung-notes-mvp-release-unsigned
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
        continue-on-error: true
