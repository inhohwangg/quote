plugins {
    id "com.android.application"
    id "kotlin-android"
    // The Flutter Gradle Plugin must be applied after the Android and Kotlin Gradle plugins.
    id "dev.flutter.flutter-gradle-plugin"
    // NOTE: Apply com.google.gms.google-services here after adding a real google-services.json
    // from Firebase Console (replace android/app/google-services.json with the real file).
}

android {
    namespace = "com.example.quote"
    compileSdk = 35  // pinned: flutter.compileSdkVersion (36) not on CI runners
    ndkVersion = "27.0.12077973"  // pinned: flutter.ndkVersion (28.x) not on CI runners

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_1_8
        targetCompatibility = JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = JavaVersion.VERSION_1_8
    }

    defaultConfig {
        // TODO: Specify your own unique Application ID (https://developer.android.com/studio/build/application-id.html).
        applicationId = "com.example.quote"
        // You can update the following values to match your application needs.
        // For more information, see: https://flutter.dev/to/review-gradle-config.
        minSdk = 21  // Android 5.0 Lollipop — minimum supported
        targetSdk = 35  // pinned: flutter.targetSdkVersion (36) not on CI runners
        versionCode = flutter.versionCode
        versionName = flutter.versionName
        // MultiDex required on API 21 when method count exceeds 64K (AdMob + Drive + IAP).
        multiDexEnabled = true
    }

    buildTypes {
        release {
            // TODO: Add your own signing config for the release build.
            // Signing with the debug keys for now, so `flutter run --release` works.
            signingConfig = signingConfigs.debug
        }
    }
}

flutter {
    source = "../.."
}
