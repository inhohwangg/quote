name: quote
description: Offline memo app
publish_to: 'none'
version: 2.0.0+1

environment:
  sdk: ^3.5.3

dependencies:
  flutter:
    sdk: flutter

  # State & Routing
  flutter_riverpod: ^2.6.1
  go_router: ^14.6.3

  # Local DB
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # PDF
  pdf: ^3.11.1
  printing: ^5.13.1

  # Media
  image_picker: ^1.1.2

  # Permissions
  permission_handler: ^11.3.1

  # Utils
  uuid: ^4.5.1
  path_provider: ^2.1.4
  shared_preferences: ^2.3.5
  intl: ^0.20.1

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  mocktail: ^1.0.4
  hive_generator: ^2.0.1
  build_runner: ^2.4.13

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/fonts/
  fonts:
    - family: PretendardGOV
      fonts:
        - asset: assets/fonts/PretendardGOV-Regular.ttf
        - asset: assets/fonts/PretendardGOV-Medium.ttf
        - asset: assets/fonts/PretendardGOV-SemiBold.ttf
        - asset: assets/fonts/PretendardGOV-Bold.ttf
