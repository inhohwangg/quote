name: samsung_notes_mvp
description: "Lightweight offline Samsung Notes-style memo app for Android"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  # State management
  flutter_riverpod: ^2.5.1
  # Local DB – zero-overhead key-value store
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  # Navigation
  go_router: ^13.2.0
  # First-launch flag
  shared_preferences: ^2.3.2
  # UUID generation for note IDs
  uuid: ^4.4.0
  # Date formatting
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  hive_generator: ^2.0.1
  build_runner: ^2.4.11
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/fonts/

  fonts:
    - family: PretendardGOV
      fonts:
        - asset: assets/fonts/PretendardGOV-Light.ttf
          weight: 300
        - asset: assets/fonts/PretendardGOV-Regular.ttf
          weight: 400
        - asset: assets/fonts/PretendardGOV-Bold.ttf
          weight: 700
        - asset: assets/fonts/PretendardGOV-Black.ttf
          weight: 900
        - asset: assets/fonts/PretendardGOV-ExtraLight.ttf
          weight: 200
